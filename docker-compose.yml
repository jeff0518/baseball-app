version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: baseball-app-db
    environment:
      POSTGRES_USER: baseball_user
      POSTGRES_PASSWORD: baseball_password
      POSTGRES_DB: baseball_app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baseball_user -d baseball_app"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
